name: Deploy UTS IP Group Assignment Frontend

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::495124020469:role/Github_ssm_access
          aws-region: ap-southeast-2

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub CI/CD frontend Deploy to EC2" \
            --instance-ids "i-0b9df244c4e19afaa" \
            --parameters 'commands=["sudo bash /home/ec2-user/auto_deploy/deploy_frontend.sh"]' \
            --region ap-southeast-2
